name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx nuxi typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NUXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NUXT_PUBLIC_SUPABASE_KEY: placeholder-key
          NUXT_PUBLIC_SITE_URL: https://placeholder.vercel.app
          NUXT_SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
          NUXT_RESEND_API_KEY: placeholder-resend

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build Nuxt
        run: npm run build
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.E2E_SUPABASE_KEY }}
          NUXT_PUBLIC_SITE_URL: http://localhost:3000
          NUXT_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          NUXT_RESEND_API_KEY: placeholder-resend

      - name: Run E2E tests
        run: npx playwright test --project=unauthenticated
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
